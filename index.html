<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body {
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('https://images.unsplash.com/photo-1612809895277-2a6e9ccbe191?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=1920') 
                no-repeat center center fixed;
    background-size: cover;
    color: white;
    overflow-x: hidden;
}

/* NAVBAR */
nav {
    position: fixed;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 80px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    z-index: 1000;
}
nav h1 {color:#00e0ff;font-weight:800;font-size:1.8rem;}
nav ul {display:flex;gap:40px;list-style:none;}
nav ul li a {color:white;font-weight:600;transition:.3s;}
nav ul li a:hover {color:#00e0ff;}

/* BOTTONI PRINCIPALI */
.play-btn {
    margin-top:10px;
    padding:18px 50px;
    border:none;
    border-radius:50px;
    font-size:1.1rem;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
    color:white;
}
.play-btn:hover {transform:scale(1.07);}

/* SEZIONI */
.section {
    padding:100px 80px;
    text-align:center;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(5px);
    margin: 80px auto;
    border-radius:20px;
}
.section h3 {
    font-size:2.8rem;
    margin-bottom:60px;
    color:#00e0ff;
    text-shadow:1px 1px 5px black;
}
.card, .staff-card {
    background: rgba(255,255,255,0.05);
    padding: 30px 50px;
    border-radius: 20px;
    transition:.3s;
    min-width: 200px;
}
.card:hover, .staff-card:hover {background: rgba(0,224,255,0.15); transform: translateY(-5px);}
.card h4, .staff-card h4 {font-size:1.5rem; margin-bottom:15px; text-shadow:1px 1px 5px black;}
footer {
    background:black;
    padding:30px;
    text-align:center;
    opacity:.9;
    margin-top:80px;
}
footer a {color:#00e0ff;margin:0 10px;transition:.3s;}
footer a:hover {color:#fff;}

@media(max-width:768px){
    nav {padding:15px 30px;}
    .card, .staff-card {width:90%;}
}
</style>
</head>
<body>

<nav>
