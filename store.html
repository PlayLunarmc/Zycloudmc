<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZycloudMC - Store</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body{
  background: linear-gradient(rgba(0,0,50,0.7), rgba(0,0,100,0.7)),
              url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=1920') no-repeat center center fixed;
  background-size: cover;color:white;overflow-x:hidden;
}

/* NAVBAR */
nav{position:fixed;width:100%;display:flex;justify-content:space-between;align-items:center;padding:20px 80px;background:rgba(0,0,50,0.7);backdrop-filter:blur(10px);z-index:1000;}
nav h1{color:#00e0ff;font-weight:800;font-size:1.8rem;}
nav ul{display:flex;gap:40px;list-style:none;}
nav ul li a{color:white;font-weight:600;transition:.3s;}
nav ul li a:hover{color:#00e0ff;}

/* STORE SECTION */
.section{padding:120px 80px;text-align:center;background:rgba(0,0,50,0.7);backdrop-filter:blur(5px);margin-top:100px;border-radius:20px;}
.section h3{font-size:2.8rem;margin-bottom:60px;color:#00e0ff;text-shadow:1px 1px 5px black;}
.store-grid{display:flex;justify-content:center;gap:40px;flex-wrap:wrap;}
.card{background:rgba(255,255,255,0.05);padding:40px;border-radius:20px;width:280px;transition:.3s;box-shadow:0 5px 15px rgba(0,0,0,0.3);}
.card:hover{transform:translateY(-10px);background:rgba(0,224,255,0.15);box-shadow:0 10px 25px rgba(0,0,0,0.5);}
.rank-title{font-size:1.5rem;font-weight:800;margin-bottom:10px;}
.price{margin:20px 0;font-size:1.3rem;color:#00e0ff;}
.buy-btn{padding:12px 35px;border:none;border-radius:40px;background:linear-gradient(45deg,#00e0ff,#0099ff);font-weight:700;cursor:pointer;transition:.3s;}
.buy-btn:hover{transform:scale(1.05);}

footer{background:black;padding:30px;text-align:center;opacity:.9;margin-top:80px;}
footer a{color:#00e0ff;margin:0 10px;transition:.3s;}
footer a:hover{color:#fff;}

@media(max-width:768px){.card{width:90%;} nav{padding:15px 30px;}}
</style>
</head>
<body>

<nav>
<h1>ZycloudMC</h1>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="staff.html">Staff</a></li>
<li><a href="store.html">Store</a></li>
</ul>
</nav>

<div class="section">
<h3>Ranks & Store</h3>
<div class="store-grid">
  <div class="card">
    <div class="rank-title" style="color:gold;">👑 GOLD</div>
    <p>Tag esclusivo</p>
    <p>Accesso comandi speciali</p>
    <div class="price">€4.99</div>
    <button class="buy-btn">Compra</button>
  </div>
  <div class="card">
    <div class="rank-title" style="color:#00e0ff;">💎 DIAMOND</div>
    <p>Tutti i vantaggi GOLD</p>
    <p>Kit esclusivi</p>
    <div class="price">€9.99</div>
    <button class="buy-btn">Compra</button>
  </div>
</div>
</div>

<footer>
<div style="margin-bottom:10px;">
<a href="#">Discord</a>
<a href="#">Instagram</a>
<a href="#">Twitter</a>
</div>
© 2026 ZycloudMC - Tutti i diritti riservati
</footer>

</body>
</html>
